{% extends "base.html" %}
{% block title %}用户管理 - 气象信息管理系统{% endblock %}
{% block page_title %}用户管理{% endblock %}

{% block page_actions %}
<button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#userModal" onclick="clearUserForm()">
    <i class="bi bi-person-plus me-1"></i>添加用户
</button>
{% endblock %}

{% block content %}
<div class="card">
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-hover table-striped mb-0">
                <thead class="table-light">
                    <tr>
                        <th>用户名</th>
                        <th>邮箱</th>
                        <th>角色</th>
                        <th>状态</th>
                        <th>创建时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="users-tbody">
                    <tr><td colspan="6" class="text-center py-4 text-muted">加载中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- User Form Modal -->
<div class="modal fade" id="userModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="userModalTitle">添加用户</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="user-id">
                <div class="mb-3">
                    <label class="form-label">用户名 *</label>
                    <input type="text" id="user-username" class="form-control" placeholder="请输入用户名">
                </div>
                <div class="mb-3">
                    <label class="form-label">密码 *</label>
                    <input type="password" id="user-password" class="form-control" placeholder="请输入密码">
                    <small class="text-muted" id="password-hint"></small>
                </div>
                <div class="mb-3">
                    <label class="form-label">邮箱</label>
                    <input type="email" id="user-email" class="form-control" placeholder="user@example.com">
                </div>
                <div class="mb-3">
                    <label class="form-label">角色 *</label>
                    <select id="user-role" class="form-select">
                        <option value="viewer">观察者 (只读)</option>
                        <option value="editor">编辑者 (可增删改)</option>
                        <option value="admin">管理员 (全部权限)</option>
                    </select>
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="user-active" checked>
                    <label class="form-check-label" for="user-active">账号激活</label>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="saveUser()">保存</button>
            </div>
        </div>
    </div>
</div>

<!-- Delete Confirm Modal -->
<div class="modal fade" id="deleteUserModal" tabindex="-1">
    <div class="modal-dialog modal-sm">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">确认删除</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p>确定要删除该用户吗？此操作不可撤销。</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-danger" id="btn-confirm-user-delete">确认删除</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/users.js') }}"></script>
{% endblock %}
